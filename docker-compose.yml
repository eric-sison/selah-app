services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: selah
      POSTGRES_PASSWORD: selah
      POSTGRES_DB: selah
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U selah"]
      interval: 5s
      timeout: 5s
      retries: 5

  mailpit:
    image: axllent/mailpit:latest
    restart: unless-stopped
    ports:
      - "1025:1025" # SMTP
      - "8025:8025" # web UI

  garage:
    image: dxflrs/garage:v2.3.0
    restart: unless-stopped
    environment:
      GARAGE_CONFIG_FILE: /etc/garage.toml
    volumes:
      - ./garage/garage.toml:/etc/garage.toml:ro
      - garage_meta:/var/lib/garage/meta
      - garage_data:/var/lib/garage/data
    ports:
      - "3900:3900" # S3 API
      - "3903:3903" # admin API (used by scripts/garage-init.sh)

  garage-webui:
    image: khairul169/garage-webui:latest
    restart: unless-stopped
    depends_on:
      - garage
    volumes:
      - ./garage/garage.toml:/etc/garage.toml:ro
    environment:
      API_BASE_URL: http://garage:3903
      S3_ENDPOINT_URL: http://garage:3900
    ports:
      - "3909:3909" # unauthenticated - local dev only, same as the other services here

volumes:
  postgres_data:
  garage_meta:
  garage_data:
