# Local-dev-only Garage (S3-compatible object storage) config.
# Secrets below are fixed, non-secret dev values — same spirit as the
# hardcoded postgres/mailpit credentials in docker-compose.yml. Do not reuse
# these in any shared or production environment.

metadata_dir = "/var/lib/garage/meta"
data_dir = "/var/lib/garage/data"
db_engine = "sqlite"

replication_factor = 1

rpc_bind_addr = "[::]:3901"
rpc_public_addr = "127.0.0.1:3901"
rpc_secret = "a3d5d1939da9845308a8ba5b9a8834f2f16faf5c824c3b9dda63e52fd4f3d288"

[s3_api]
s3_region = "garage"
api_bind_addr = "[::]:3900"
root_domain = ".s3.garage.localhost"

[admin]
api_bind_addr = "[::]:3903"
admin_token = "e40473e12dd6f17ab3089ff1ee678bb9"
metrics_token = "13a7815b15a81e6ce130e8e19d8ae538"
